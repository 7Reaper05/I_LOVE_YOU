<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  background: black;
  color: white;
  animation: subtleMove 10s infinite alternate ease-in-out;
}

@keyframes subtleMove {
  from { transform: translateY(0px); }
  to { transform: translateY(-5px); }
}

/* 🔐 LOCK */
#lockScreen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

input { padding:10px; font-size:1.2rem; }
button { margin-top:10px; padding:10px 20px; }

/* 🎬 MAIN */
#mainContent {
  display: none;
  position: relative;
  width: 100%;
  height: 100vh;
}

/* 🎞️ FILM */
.film-container {
  position: absolute;
  width: 100%;
  height: 200%;
}

.film-row {
  position: absolute;
  display: flex;
  gap: 15px;
  padding: 25px 20px;
  background: #111;
  width: max-content;

  /* 🎬 depth */
  box-shadow:
    0 10px 30px rgba(0,0,0,0.8),
    inset 0 0 20px rgba(255,255,255,0.05);
}

.row1 { top: 0%; }
.row2 { top: 35%; }
.row3 { top: 70%; }

/* 🎞️ HOLES */
.film-row::before,
.film-row::after {
  content: "";
  position: absolute;
  left: 0;
  width: 100%;
  height: 18px;

  background-image: repeating-linear-gradient(
    to right,
    transparent 0px,
    transparent 14px,
    black 14px,
    black 18px
  );
}

.film-row::before {
  top: 0;
  box-shadow: inset 0 -2px 4px rgba(255,255,255,0.2);
}
.film-row::after {
  bottom: 0;
  box-shadow: inset 0 2px 4px rgba(255,255,255,0.2);
}

/* 📸 PHOTOS */
.photo {
  width: 160px;
  height: 110px;
  background-size: cover;
  background-position: center;
  border: 2px solid #222;
}

/* 🧠 PARALLAX */
.slow {
  animation: scrollSlow 60s linear infinite;
  opacity: 0.25;
  transform: scale(0.85);
  filter: blur(1px);
}
.medium {
  animation: scrollMedium 35s linear infinite;
  opacity: 0.6;
}
.fast {
  animation: scrollFast 18s linear infinite;
  transform: scale(1.15);
}

/* 🌊 LOOP */
@keyframes scrollSlow {
  from { transform: translateY(0); }
  to { transform: translateY(-50%); }
}
@keyframes scrollMedium {
  from { transform: translateY(0); }
  to { transform: translateY(-50%); }
}
@keyframes scrollFast {
  from { transform: translateY(0); }
  to { transform: translateY(-50%); }
}

/* 💌 LETTERS */
.letter {
  position: absolute;
  width: 220px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  border: 1px solid white;
}

#l1 { top: 10%; left: 5%; }
#l2 { top: 30%; right: 5%; }
#l3 { top: 55%; left: 10%; }
#l4 { top: 70%; right: 10%; }
#l5 { top: 20%; left: 40%; }
#l6 { top: 65%; left: 45%; }

/* ✨ GRAIN */
.grain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.15;
}

/* ♾️ BUTTON */
#portalBtn {
  position: fixed;
  bottom: 20px;
  right: 25px;
  opacity: 0.3;
  cursor: pointer;
}

/* 🌌 BLACK HOLE */
#blackHolePage {
  position: fixed;
  inset: 0;
  display: none;
  background: black;
  z-index: 200;
}

#backBtn {
  position: absolute;
  bottom: 20px;
  right: 25px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="lockScreen">
  <h1>Enter Passcode</h1>
  <input type="password" id="code">
  <button onclick="unlock()">Unlock</button>
</div>

<div id="mainContent">

<div class="grain"></div>

<div class="film-container">

<div class="film-row row1 slow">
<div class="photo" style="background-image:url('1.jpg')"></div>
<div class="photo" style="background-image:url('2.jpg')"></div>

<div class="photo" style="background-image:url('1.jpg')"></div>
<div class="photo" style="background-image:url('2.jpg')"></div>
<div class="photo" style="background-image:url('3.jpg')"></div>
<div class="photo" style="background-image:url('4.jpg')"></div>
<div class="photo" style="background-image:url('5.jpg')"></div>
</div>

<div class="film-row row2 medium">
<div class="photo" style="background-image:url('6.jpg')"></div>
<div class="photo" style="background-image:url('7.jpg')"></div>
<div class="photo" style="background-image:url('8.jpg')"></div>
<div class="photo" style="background-image:url('9.jpg')"></div>

<div class="photo" style="background-image:url('6.jpg')"></div>
<div class="photo" style="background-image:url('7.jpg')"></div>
<div class="photo" style="background-image:url('8.jpg')"></div>
<div class="photo" style="background-image:url('9.jpg')"></div>
</div>

<div class="film-row row3 fast">
<div class="photo" style="background-image:url('10.jpg')"></div>

<div class="photo" style="background-image:url('12.jpg')"></div>
</div>

</div>

<div class="letter" id="l1">Message 💌</div>
<div class="letter" id="l2">Memory ✨</div>
<div class="letter" id="l3">Note 💭</div>
<div class="letter" id="l4">Meaning ❤️</div>
<div class="letter" id="l5">Inside joke 😌</div>

<div id="backBtn" onclick="closePortal()">∞</div>
</div>

<audio id="bgMusic" loop>
<source src="your-song.mp3">
</audio>

<script>
const lockScreen = document.getElementById("lockScreen");
const mainContent = document.getElementById("mainContent");
const blackHolePage = document.getElementById("blackHolePage");
const music = document.getElementById("bgMusic");

function unlock(){
  if(document.getElementById("code").value==="yourpasscode"){
    lockScreen.style.display="none";
    mainContent.style.display="block";

    music.volume=0;
    music.play().catch(()=>{});
    let v=0;
    let fade=setInterval(()=>{
      if(v<0.6){v+=0.05; music.volume=v;}
      else clearInterval(fade);
    },200);
  }
}

function openPortal(){
  mainContent.style.display="none";
  blackHolePage.style.display="block";
}
function closePortal(){
  blackHolePage.style.display="none";
  mainContent.style.display="block";
}

/* 🌌 REALISTIC BLACK HOLE */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];
for(let i=0;i<1000;i++){
particles.push({
angle:Math.random()*Math.PI*2,
radius:100+Math.random()*400,
speed:0.002+Math.random()*0.004,
size:Math.random()*1.5
});
}

function draw(){
ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

let cx=canvas.width/2;
let cy=canvas.height/2;

particles.forEach(p=>{
p.angle+=p.speed;
p.radius*=0.997;
if(p.radius<50)p.radius=400;

let x=cx+Math.cos(p.angle)*p.radius;
let y=cy+Math.sin(p.angle)*p.radius;

let glow=255-p.radius*0.4;

ctx.beginPath();
ctx.arc(x,y,p.size,0,Math.PI*2);
ctx.fillStyle=`rgb(${glow},${glow*0.6},255)`;
ctx.fill();
});

/* core */
let g=ctx.createRadialGradient(cx,cy,10,cx,cy,120);
g.addColorStop(0,"black");
g.addColorStop(1,"transparent");
ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(cx,cy,120,0,Math.PI*2);
ctx.fill();

/* accretion disk */
ctx.beginPath();
ctx.arc(cx,cy,200,0,Math.PI*2);
ctx.strokeStyle="rgba(100,150,255,0.15)";
ctx.lineWidth=40;
ctx.stroke();

requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
