<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  background: black;
  color: white;
}

/* 🔐 LOCK SCREEN */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

input {
  padding: 10px;
  font-size: 1.2rem;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
}

/* 🌌 STAR BACKGROUND */
#stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* 🎬 MAIN */
#mainContent {
  display: none;
  position: relative;
  width: 100%;
  height: 100vh;
}

/* 🎞️ FILM */
.film-container {
  position: absolute;
  width: 100%;
  height: 200%;
  z-index: 2;
}

.film-row {
  position: absolute;
  display: flex;
  gap: 20px;
  padding: 25px 0;
  width: 200vw;
  animation: scrollY linear infinite;
}

@keyframes scrollY {
  from { transform: translateY(0); }
  to { transform: translateY(-50%); }
}

.row1 { top: 0%; }
.row2 { top: 35%; }
.row3 { top: 70%; }

.slow { animation-duration: 45s; opacity: 0.5; }
.medium { animation-duration: 30s; opacity: 0.75; }
.fast { animation-duration: 20s; opacity: 1; }

/* 🎞️ FILM HOLES */
.film-row::before,
.film-row::after {
  content: "";
  position: absolute;
  left: 0;
  width: 100%;
  height: 18px;
  background-image: repeating-linear-gradient(
    to right,
    transparent 0px,
    transparent 14px,
    black 14px,
    black 18px
  );
}

.film-row::before { top: 0; }
.film-row::after { bottom: 0; }

/* 📸 PHOTOS */
.photo {
  width: 180px;
  height: 120px;
  background-size: cover;
  background-position: center;
  border: 2px solid #333;
  filter: brightness(1.15) contrast(1.15);
}

/* 💌 LETTERS */
.letter {
  position: absolute;
  width: 220px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  border: 1px solid white;
  z-index: 3;
}

#l1 { top: 10%; left: 5%; }
#l2 { top: 30%; right: 5%; }
#l3 { top: 55%; left: 10%; }
#l4 { top: 70%; right: 10%; }
#l5 { top: 20%; left: 40%; }
#l6 { top: 65%; left: 45%; }

/* ♾️ BUTTON */
#portalBtn {
  position: fixed;
  bottom: 20px;
  right: 25px;
  opacity: 0.4;
  cursor: pointer;
  z-index: 5;
}

/* 🌌 BLACK HOLE PAGE */
#blackHolePage {
  position: fixed;
  inset: 0;
  display: none;
  background: black;
  z-index: 200;
}

#backBtn {
  position: absolute;
  bottom: 20px;
  right: 25px;
  cursor: pointer;
  z-index: 10;
}

/* 💬 PHRASES */
.phrase {
  position: absolute;
  color: white;
  font-size: 14px;
  pointer-events: none;
  animation: popOut 0.6s ease-out, fadeOut 2.5s forwards;
}

@keyframes popOut {
  0% { transform: scale(0.5) translateY(0); opacity: 0; }
  60% { transform: scale(1.2) translateY(-20px); opacity: 1; }
  100% { transform: scale(1) translateY(-10px); }
}

@keyframes fadeOut {
  0% { opacity: 1; }
  100% { opacity: 0; transform: translateY(80px); }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="lockScreen">
  <h1>Enter Passcode</h1>
  <input type="password" id="code">
  <button onclick="unlock()">Unlock</button>
</div>

<div id="mainContent">
<div class="film-container">

  <div class="film-row row1 slow">
    <div class="photo" style="background-image:url('1.jpg')"></div>
    <div class="photo" style="background-image:url('2.jpg')"></div>
    <div class="photo" style="background-image:url('3.jpg')"></div>
    <div class="photo" style="background-image:url('4.jpg')"></div>
    <div class="photo" style="background-image:url('5.jpg')"></div>
    <div class="photo" style="background-image:url('1.jpg')"></div>
    <div class="photo" style="background-image:url('2.jpg')"></div>
    <div class="photo" style="background-image:url('3.jpg')"></div>
    <div class="photo" style="background-image:url('4.jpg')"></div>
    <div class="photo" style="background-image:url('5.jpg')"></div>
  </div>

  <div class="film-row row2 medium">
    <div class="photo" style="background-image:url('6.jpg')"></div>
    <div class="photo" style="background-image:url('7.jpg')"></div>
    <div class="photo" style="background-image:url('8.jpg')"></div>
    <div class="photo" style="background-image:url('9.jpg')"></div>
    <div class="photo" style="background-image:url('6.jpg')"></div>
    <div class="photo" style="background-image:url('7.jpg')"></div>
    <div class="photo" style="background-image:url('8.jpg')"></div>
    <div class="photo" style="background-image:url('9.jpg')"></div>
  </div>

  <div class="film-row row3 fast">
    <div class="photo" style="background-image:url('10.jpg')"></div>
    <div class="photo" style="background-image:url('11.jpg')"></div>
    <div class="photo" style="background-image:url('12.jpg')"></div>
    <div class="photo" style="background-image:url('10.jpg')"></div>
    <div class="photo" style="background-image:url('11.jpg')"></div>
    <div class="photo" style="background-image:url('12.jpg')"></div>
  </div>

</div>

<div class="letter" id="l1">Message 💌</div>
<div class="letter" id="l2">Memory ✨</div>
<div class="letter" id="l3">Note 💭</div>
<div class="letter" id="l4">Meaning ❤️</div>
<div class="letter" id="l5">Inside joke 😌</div>
<div class="letter" id="l6">Forever ♾️</div>

<div id="portalBtn" onclick="openPortal()">∞</div>
</div>

<div id="blackHolePage">
<canvas id="bhCanvas"></canvas>
<div id="backBtn" onclick="closePortal()">∞</div>
</div>

<audio id="bgMusic" loop>
<source src="your-song.mp3">
</audio>

<script>
const starsCanvas=document.getElementById("stars");
const sctx=starsCanvas.getContext("2d");
starsCanvas.width=innerWidth;
starsCanvas.height=innerHeight;

let stars=[];
for(let i=0;i<800;i++){
stars.push({x:Math.random()*starsCanvas.width,y:Math.random()*starsCanvas.height,size:Math.random()*2,opacity:Math.random()});
}

function drawStars(){
sctx.clearRect(0,0,starsCanvas.width,starsCanvas.height);
stars.forEach(s=>{
sctx.beginPath();
sctx.arc(s.x,s.y,s.size,0,Math.PI*2);
sctx.fillStyle=`rgba(255,255,255,${s.opacity})`;
sctx.fill();
});
requestAnimationFrame(drawStars);
}
drawStars();

function unlock(){
if(document.getElementById("code").value==="yourpasscode"){
lockScreen.style.display="none";
mainContent.style.display="block";
bgMusic.volume=0;
bgMusic.play();
let v=0;
let fade=setInterval(()=>{if(v<0.6){v+=0.05;bgMusic.volume=v;}else clearInterval(fade);},200);
}}

function openPortal(){mainContent.style.display="none";blackHolePage.style.display="block";}
function closePortal(){blackHolePage.style.display="none";mainContent.style.display="block";}

/* 🌌 BLACK HOLE FINAL */
const bhCanvas=document.getElementById("bhCanvas");
const ctx=bhCanvas.getContext("2d");
bhCanvas.width=innerWidth;
bhCanvas.height=innerHeight;

let particles=[];
for(let i=0;i<1400;i++){
particles.push({angle:Math.random()*Math.PI*2,radius:180+Math.random()*600,speed:0.002+Math.random()*0.003,size:Math.random()*1.4});
}

const phrases=["I remember you","always here","you matter","forever us","still with you","never gone"];

bhCanvas.addEventListener("click",(e)=>{spawnPhrase(e.clientX,e.clientY);});

function spawnPhrase(x,y){
let el=document.createElement("div");
el.className="phrase";
el.innerText=phrases[Math.floor(Math.random()*phrases.length)];
el.style.left=x+"px";
el.style.top=y+"px";
document.body.appendChild(el);
setTimeout(()=>el.remove(),2500);
}

let pulse=0;

function draw(){
ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,bhCanvas.width,bhCanvas.height);

let cx=bhCanvas.width/2;
let cy=bhCanvas.height/2;

pulse+=0.02;
let scale=1.15+Math.sin(pulse)*0.03;

/* glow */
let g=ctx.createRadialGradient(cx,cy,80*scale,cx,cy,350*scale);
g.addColorStop(0,"black");
g.addColorStop(0.4,"rgba(120,120,255,0.6)");
g.addColorStop(0.7,"rgba(200,200,255,0.4)");
g.addColorStop(1,"transparent");

ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(cx,cy,350*scale,0,Math.PI*2);
ctx.fill();

/* center */
ctx.beginPath();
ctx.arc(cx,cy,160*scale,0,Math.PI*2);
ctx.fillStyle="black";
ctx.fill();

/* particles in front */
particles.forEach(p=>{
p.angle+=p.speed;
p.radius*=0.999;
if(p.radius<180)p.radius=600;

let x=cx+Math.cos(p.angle)*p.radius;
let y=cy+Math.sin(p.angle)*p.radius*0.35;

ctx.beginPath();
ctx.arc(x,y,p.size*1.3,0,Math.PI*2);
ctx.fillStyle="rgba(230,230,255,0.9)";
ctx.fill();
});

/* 🌊 REAL LENSING */
let lens=ctx.createRadialGradient(cx,cy,0,cx,cy,400);
lens.addColorStop(0,"rgba(255,255,255,0.25)");
lens.addColorStop(0.3,"rgba(255,255,255,0.1)");
lens.addColorStop(0.6,"rgba(255,255,255,0.05)");
lens.addColorStop(1,"transparent");

ctx.save();
ctx.globalCompositeOperation="lighter";
ctx.beginPath();
ctx.ellipse(cx,cy,420,35,0,0,Math.PI*2);
ctx.fillStyle=lens;
ctx.fill();
ctx.restore();

requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
