<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  background: black;
  color: white;
}

/* 🔐 LOCK SCREEN */
#lockScreen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

input {
  padding: 10px;
  font-size: 1.2rem;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  cursor: pointer;
}

/* 🎬 MAIN */
#mainContent {
  display: none;
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

/* 🎞️ FILM CONTAINER */
.film-container {
  position: absolute;
  width: 100%;
  height: 200%;
}

/* 🎞️ ROWS */
.film-row {
  position: absolute;
  display: flex;
  gap: 15px;
  padding: 25px 20px;
  background: #111;
  width: max-content;
}

/* Row vertical placement */
.row1 { top: 0%; }
.row2 { top: 35%; }
.row3 { top: 70%; }

/* 🎞️ FILM HOLES */
.film-row::before,
.film-row::after {
  content: "";
  position: absolute;
  left: 0;
  width: 100%;
  height: 14px;
  background-image: repeating-linear-gradient(
    to right,
    transparent 0px,
    transparent 18px,
    black 18px,
    black 26px
  );
  z-index: 2;
}
.film-row::before { top: 0; }
.film-row::after { bottom: 0; }

/* 📸 PHOTOS */
.photo {
  width: 160px;
  height: 110px;
  background-size: cover;
  background-position: center;
  border: 2px solid #222;
  flex-shrink: 0;
}

/* 🧠 PARALLAX SPEEDS */
.slow { animation: scrollSlow 40s linear infinite; opacity: 0.4; }
.medium { animation: scrollMedium 25s linear infinite; opacity: 0.7; }
.fast { animation: scrollFast 15s linear infinite; }

/* 🌊 Infinite scroll */
@keyframes scrollSlow {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}
@keyframes scrollMedium {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}
@keyframes scrollFast {
  0% { transform: translateY(0); }
  100% { transform: translateY(-50%); }
}

/* 💌 LETTERS */
.letter {
  position: absolute;
  width: 220px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  border: 1px solid white;
}

#l1 { top: 10%; left: 5%; }
#l2 { top: 30%; right: 5%; }
#l3 { top: 55%; left: 10%; }
#l4 { top: 70%; right: 10%; }
#l5 { top: 20%; left: 40%; }
#l6 { top: 65%; left: 45%; }

/* ✨ GRAIN */
.grain {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.15;
}

/* ♾️ BUTTON */
#portalBtn {
  position: fixed;
  bottom: 20px;
  right: 25px;
  opacity: 0.3;
  cursor: pointer;
  z-index: 10;
}

/* 🌌 BLACK HOLE */
#blackHolePage {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  z-index: 200;
}

#backBtn {
  position: absolute;
  bottom: 20px;
  right: 25px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔐 LOCK -->
<div id="lockScreen">
  <h1>Enter Passcode</h1>
  <input type="password" id="code">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- 🎬 MAIN -->
<div id="mainContent">

<div class="grain"></div>

<div class="film-container">

  <!-- 🎞️ ROW 1 -->
  <div class="film-row row1 slow">
    <!-- duplicate for loop -->
    <div class="photo" style="background-image:url('1.jpg')"></div>
    <div class="photo" style="background-image:url('2.jpg')"></div>
    <div class="photo" style="background-image:url('3.jpg')"></div>
    <div class="photo" style="background-image:url('4.jpg')"></div>
    <div class="photo" style="background-image:url('5.jpg')"></div>

    <div class="photo" style="background-image:url('1.jpg')"></div>
    <div class="photo" style="background-image:url('2.jpg')"></div>
    <div class="photo" style="background-image:url('3.jpg')"></div>
    <div class="photo" style="background-image:url('4.jpg')"></div>
    <div class="photo" style="background-image:url('5.jpg')"></div>
  </div>

  <!-- 🎞️ ROW 2 -->
  <div class="film-row row2 medium">
    <div class="photo" style="background-image:url('6.jpg')"></div>
    <div class="photo" style="background-image:url('7.jpg')"></div>
    <div class="photo" style="background-image:url('8.jpg')"></div>
    <div class="photo" style="background-image:url('9.jpg')"></div>

    <div class="photo" style="background-image:url('6.jpg')"></div>
    <div class="photo" style="background-image:url('7.jpg')"></div>
    <div class="photo" style="background-image:url('8.jpg')"></div>
    <div class="photo" style="background-image:url('9.jpg')"></div>
  </div>

  <!-- 🎞️ ROW 3 -->
  <div class="film-row row3 fast">
    <div class="photo" style="background-image:url('10.jpg')"></div>
    <div class="photo" style="background-image:url('11.jpg')"></div>
    <div class="photo" style="background-image:url('12.jpg')"></div>

    <div class="photo" style="background-image:url('10.jpg')"></div>
    <div class="photo" style="background-image:url('11.jpg')"></div>
    <div class="photo" style="background-image:url('12.jpg')"></div>
  </div>

</div>

<!-- 💌 LETTERS -->
<div class="letter" id="l1">Message 💌</div>
<div class="letter" id="l2">Memory ✨</div>
<div class="letter" id="l3">Note 💭</div>
<div class="letter" id="l4">Meaning ❤️</div>
<div class="letter" id="l5">Inside joke 😌</div>
<div class="letter" id="l6">Forever ♾️</div>

<div id="portalBtn" onclick="openPortal()">∞</div>

</div>

<!-- 🌌 BLACK HOLE -->
<div id="blackHolePage">
  <canvas id="canvas"></canvas>
  <div id="backBtn" onclick="closePortal()">∞</div>
</div>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
  <source src="your-song.mp3" type="audio/mpeg">
</audio>

<script>
const lockScreen = document.getElementById("lockScreen");
const mainContent = document.getElementById("mainContent");
const blackHolePage = document.getElementById("blackHolePage");
const music = document.getElementById("bgMusic");

function unlock() {
  const pass = document.getElementById("code").value;

  if(pass === "yourpasscode") {
    lockScreen.style.display = "none";
    mainContent.style.display = "block";

    music.volume = 0;
    music.play().catch(()=>{});

    let v = 0;
    let fade = setInterval(()=>{
      if(v < 0.6){
        v += 0.05;
        music.volume = v;
      } else clearInterval(fade);
    },200);
  }
}

/* portal */
function openPortal(){
  mainContent.style.display = "none";
  blackHolePage.style.display = "block";
}
function closePortal(){
  blackHolePage.style.display = "none";
  mainContent.style.display = "block";
}

/* 🌌 BLACK HOLE */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<600;i++){
  particles.push({
    angle: Math.random()*Math.PI*2,
    radius: Math.random()*300,
    speed: 0.002 + Math.random()*0.003
  });
}

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.2)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.angle+=p.speed;
    p.radius*=0.995;
    if(p.radius<2) p.radius=300;

    let x = canvas.width/2 + Math.cos(p.angle)*p.radius;
    let y = canvas.height/2 + Math.sin(p.angle)*p.radius;

    ctx.beginPath();
    ctx.arc(x,y,1.2,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
