<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  background: black;
  color: white;
}

/* 🔐 LOCK SCREEN (your original style) */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

#lockScreen h1 {
  font-size: 2.5rem;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  font-size: 1.2rem;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
}

/* 🌌 STAR BACKGROUND */
#stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* 🎬 MAIN */
#mainContent {
  display: none;
  position: relative;
  width: 100%;
  height: 100vh;
}

/* 🎞️ FILM */
.film-container {
  position: absolute;
  width: 100%;
  height: 200%;
  z-index: 2;
}

.film-row {
  position: absolute;
  display: flex;
  gap: 15px;
  padding: 25px 20px;
  background: rgba(20,20,20,0.9);
  width: max-content;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.8),
    inset 0 0 20px rgba(255,255,255,0.05);
}

.row1 { top: 0%; }
.row2 { top: 35%; }
.row3 { top: 70%; }

/* 🎞️ FILM HOLES */
.film-row::before,
.film-row::after {
  content: "";
  position: absolute;
  left: 0;
  width: 100%;
  height: 18px;

  background-image: repeating-linear-gradient(
    to right,
    transparent 0px,
    transparent 14px,
    black 14px,
    black 18px
  );
}

.film-row::before { top: 0; }
.film-row::after { bottom: 0; }

/* 📸 PHOTOS */
.photo {
  width: 160px;
  height: 110px;
  background-size: cover;
  background-position: center;
  border: 2px solid #222;
}

/* 🧠 PARALLAX DEPTH */
.slow { transform: translateZ(-200px) scale(0.8); opacity: 0.3; }
.medium { transform: translateZ(-100px); opacity: 0.6; }
.fast { transform: translateZ(0px) scale(1.1); }

/* 💌 LETTERS */
.letter {
  position: absolute;
  width: 220px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  border: 1px solid white;
  z-index: 3;
}

#l1 { top: 10%; left: 5%; }
#l2 { top: 30%; right: 5%; }
#l3 { top: 55%; left: 10%; }
#l4 { top: 70%; right: 10%; }
#l5 { top: 20%; left: 40%; }
#l6 { top: 65%; left: 45%; }

/* ♾️ BUTTON */
#portalBtn {
  position: fixed;
  bottom: 20px;
  right: 25px;
  opacity: 0.4;
  cursor: pointer;
  z-index: 5;
}

/* 🌌 BLACK HOLE PAGE */
#blackHolePage {
  position: fixed;
  inset: 0;
  display: none;
  background: black;
  z-index: 200;
}

#backBtn {
  position: absolute;
  bottom: 20px;
  right: 25px;
  cursor: pointer;
  z-index: 10;
}
/* 💬 PHRASES */
.phrase {
  position: absolute;
  color: white;
  font-size: 14px;
  pointer-events: none;
  animation: popOut 0.6s ease-out, fadeOut 2.5s forwards;
}

@keyframes popOut {
  0% { transform: scale(0.5) translateY(0); opacity: 0; }
  60% { transform: scale(1.2) translateY(-20px); opacity: 1; }
  100% { transform: scale(1) translateY(-10px); }
}

@keyframes fadeOut {
  0% { opacity: 1; }
  70% { opacity: 1; }
  100% { opacity: 0; transform: translateY(80px); }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="lockScreen">
  <h1>Enter Passcode</h1>
  <input type="password" id="code">
  <button onclick="unlock()">Unlock</button>
</div>

<div id="mainContent">

<div class="film-container">
  <div class="film-row row1 slow">
    <div class="photo" style="background-image:url('1.jpg')"></div>
    <div class="photo" style="background-image:url('2.jpg')"></div>
    <div class="photo" style="background-image:url('3.jpg')"></div>
    <div class="photo" style="background-image:url('4.jpg')"></div>
    <div class="photo" style="background-image:url('5.jpg')"></div>

    <div class="photo" style="background-image:url('1.jpg')"></div>
    <div class="photo" style="background-image:url('2.jpg')"></div>
    <div class="photo" style="background-image:url('3.jpg')"></div>
    <div class="photo" style="background-image:url('4.jpg')"></div>
    <div class="photo" style="background-image:url('5.jpg')"></div>
  </div>

  <div class="film-row row2 medium">
    <div class="photo" style="background-image:url('6.jpg')"></div>
    <div class="photo" style="background-image:url('7.jpg')"></div>
    <div class="photo" style="background-image:url('8.jpg')"></div>
    <div class="photo" style="background-image:url('9.jpg')"></div>

    <div class="photo" style="background-image:url('6.jpg')"></div>
    <div class="photo" style="background-image:url('7.jpg')"></div>
    <div class="photo" style="background-image:url('8.jpg')"></div>
    <div class="photo" style="background-image:url('9.jpg')"></div>
  </div>

  <div class="film-row row3 fast">
    <div class="photo" style="background-image:url('10.jpg')"></div>
    <div class="photo" style="background-image:url('11.jpg')"></div>
    <div class="photo" style="background-image:url('12.jpg')"></div>

    <div class="photo" style="background-image:url('10.jpg')"></div>
    <div class="photo" style="background-image:url('11.jpg')"></div>
    <div class="photo" style="background-image:url('12.jpg')"></div>
  </div>
</div>

<div class="letter" id="l1">Message 💌</div>
<div class="letter" id="l2">Memory ✨</div>
<div class="letter" id="l3">Note 💭</div>
<div class="letter" id="l4">Meaning ❤️</div>
<div class="letter" id="l5">Inside joke 😌</div>
<div class="letter" id="l6">Forever ♾️</div>

<div id="portalBtn" onclick="openPortal()">∞</div>

</div>

<div id="blackHolePage">
<canvas id="bhCanvas"></canvas>
<div id="backBtn" onclick="closePortal()">∞</div>
</div>

<audio id="bgMusic" loop>
<source src="your-song.mp3">
</audio>

<script>
const starsCanvas = document.getElementById("stars");
const sctx = starsCanvas.getContext("2d");

starsCanvas.width = window.innerWidth;
starsCanvas.height = window.innerHeight;

let stars = [];
for(let i=0;i<800;i++){
  stars.push({
    x: Math.random()*starsCanvas.width,
    y: Math.random()*starsCanvas.height,
    size: Math.random()*2,
    opacity: Math.random()
  });
}

function drawStars(){
  sctx.clearRect(0,0,starsCanvas.width,starsCanvas.height);
  stars.forEach(s=>{
    sctx.beginPath();
    sctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    sctx.fillStyle=`rgba(255,255,255,${s.opacity})`;
    sctx.fill();
  });
  requestAnimationFrame(drawStars);
}
drawStars();

/* mouse parallax */
document.addEventListener("mousemove",(e)=>{
  let x = (e.clientX/window.innerWidth - 0.5)*20;
  let y = (e.clientY/window.innerHeight - 0.5)*20;
  starsCanvas.style.transform = `translate(${x}px,${y}px)`;
});

/* LOCK + MUSIC */
function unlock(){
if(document.getElementById("code").value==="yourpasscode"){
lockScreen.style.display="none";
mainContent.style.display="block";

bgMusic.volume=0;
bgMusic.play();

let v=0;
let fade=setInterval(()=>{
if(v<0.6){v+=0.05; bgMusic.volume=v;}
else clearInterval(fade);
},200);
}
}

/* PORTAL */
function openPortal(){
mainContent.style.display="none";
blackHolePage.style.display="block";
}
function closePortal(){
blackHolePage.style.display="none";
mainContent.style.display="block";
}

/* 🌌 BLACK HOLE (realistic glow ring) */
const bhCanvas = document.getElementById("bhCanvas");
const bhCtx = bhCanvas.getContext("2d");

bhCanvas.width = innerWidth;
bhCanvas.height = innerHeight;

let angle = 0;

/* 💬 phrases */
const phrases = [
  "I remember you",
  "always here",
  "you matter",
  "forever us",
  "still with you",
  "never gone"
];

bhCanvas.addEventListener("click", (e) => {
  const cx = bhCanvas.width / 2;
  const cy = bhCanvas.height / 2;

  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);

  // 🎯 only trigger if clicking near center
  if (dist < 100) {
    spawnPhrase(cx, cy);
  }
});

function spawnPhrase(x, y) {
  const text = phrases[Math.floor(Math.random() * phrases.length)];

  const el = document.createElement("div");
  el.className = "phrase";
  el.innerText = text;

  el.style.left = (x + (Math.random()*80 - 40)) + "px";
  el.style.top = (y + (Math.random()*40 - 20)) + "px";

  document.body.appendChild(el);

  setTimeout(() => {
    el.remove();
  }, 2500);
}

function drawBH() {
  bhCtx.clearRect(0, 0, bhCanvas.width, bhCanvas.height);

  let cx = bhCanvas.width / 2;
  let cy = bhCanvas.height / 2;

  angle += 0.01;

  /* 🌌 glowing rotating disk */
  for (let i = 0; i < 3; i++) {
    bhCtx.beginPath();
    bhCtx.arc(cx, cy, 180 + i*15, angle, angle + Math.PI * 1.5);
    bhCtx.strokeStyle = `rgba(180,180,255,${0.15 - i*0.03})`;
    bhCtx.lineWidth = 25;
    bhCtx.stroke();
  }

  /* ✨ bright halo */
  let g = bhCtx.createRadialGradient(cx, cy, 80, cx, cy, 250);
  g.addColorStop(0, "rgba(255,255,255,0.9)");
  g.addColorStop(0.4, "rgba(120,120,255,0.4)");
  g.addColorStop(1, "transparent");

  bhCtx.fillStyle = g;
  bhCtx.beginPath();
  bhCtx.arc(cx, cy, 250, 0, Math.PI * 2);
  bhCtx.fill();

  /* ⚫ center */
  bhCtx.beginPath();
  bhCtx.arc(cx, cy, 100, 0, Math.PI * 2);
  bhCtx.fillStyle = "black";
  bhCtx.fill();

  /* 🌊 lensing line */
  bhCtx.fillStyle = "rgba(255,255,255,0.7)";
  bhCtx.fillRect(cx - 260, cy - 2, 520, 4);

  requestAnimationFrame(drawBH);
}

drawBH();
</script>

</body>
</html>
