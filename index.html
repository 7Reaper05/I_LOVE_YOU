<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  background: black;
  color: white;
}

/* 🔐 LOCK */
#lockScreen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 100;
}

#stars {
  position: fixed;
  inset: 0;
}

/* 🎬 MAIN */
#mainContent { display:none; }

/* 🌌 BLACK HOLE */
#blackHolePage {
  position:fixed;
  inset:0;
  display:none;
}

.phrase {
  position:absolute;
  color:white;
  font-size:14px;
  animation:fade 2.5s forwards;
}
@keyframes fade {
  to { opacity:0; transform:translateY(80px); }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="lockScreen">
<h1>Enter Passcode</h1>
<input id="code" type="password">
<button onclick="unlock()">Unlock</button>
</div>

<div id="mainContent">
<div onclick="openPortal()" style="position:fixed;bottom:20px;right:20px;">∞</div>
</div>

<div id="blackHolePage">
<canvas id="bh"></canvas>
<div onclick="closePortal()" style="position:absolute;bottom:20px;right:20px;">∞</div>
</div>

<script>
/* unlock */
function unlock(){
if(code.value==="yourpasscode"){
lockScreen.style.display="none";
mainContent.style.display="block";
}
}

/* portal */
function openPortal(){
mainContent.style.display="none";
blackHolePage.style.display="block";
}
function closePortal(){
blackHolePage.style.display="none";
mainContent.style.display="block";
}

/* 🌌 BLACK HOLE */
const c=document.getElementById("bh");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

/* particles */
let parts=[];
for(let i=0;i<1400;i++){
parts.push({
  a:Math.random()*Math.PI*2,
  r:200+Math.random()*600,
  s:0.002+Math.random()*0.002,
  size:Math.random()*1.5
});
}

/* phrases */
const phrases=["I remember you","always here","you matter","forever us","still with you","never gone"];
c.onclick=e=>{
let p=document.createElement("div");
p.className="phrase";
p.innerText=phrases[Math.floor(Math.random()*6)];
p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";
document.body.appendChild(p);
setTimeout(()=>p.remove(),2500);
};

let t=0;

(function draw(){
ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,c.width,c.height);

let cx=c.width/2, cy=c.height/2;
t+=0.01;

/* 🌌 OUTER GLOW */
let glow=ctx.createRadialGradient(cx,cy,100,cx,cy,450);
glow.addColorStop(0,"rgba(200,200,255,0.3)");
glow.addColorStop(1,"transparent");
ctx.fillStyle=glow;
ctx.beginPath();
ctx.arc(cx,cy,450,0,Math.PI*2);
ctx.fill();

/* 🌊 DISK (soft) */
ctx.save();
ctx.globalCompositeOperation="lighter";

let disk=ctx.createRadialGradient(cx,cy,100,cx,cy,450);
disk.addColorStop(0,"rgba(255,255,255,0.25)");
disk.addColorStop(0.5,"rgba(180,180,255,0.15)");
disk.addColorStop(1,"transparent");

ctx.beginPath();
ctx.ellipse(cx,cy,480,90,0,0,Math.PI*2);
ctx.fillStyle=disk;
ctx.fill();

ctx.restore();

/* 🧊 DEPTH SHADOW */
let shadow=ctx.createRadialGradient(cx,cy,120,cx,cy,250);
shadow.addColorStop(0,"black");
shadow.addColorStop(1,"transparent");
ctx.fillStyle=shadow;
ctx.beginPath();
ctx.arc(cx,cy,250,0,Math.PI*2);
ctx.fill();

/* ⚫ EVENT HORIZON EDGE */
let edge=ctx.createRadialGradient(cx,cy,140,cx,cy,190);
edge.addColorStop(0,"black");
edge.addColorStop(0.7,"rgba(0,0,0,0.9)");
edge.addColorStop(1,"rgba(255,255,255,0.15)");

ctx.beginPath();
ctx.arc(cx,cy,180,0,Math.PI*2);
ctx.fillStyle=edge;
ctx.fill();

/* ⚫ CORE */
ctx.beginPath();
ctx.arc(cx,cy,160,0,Math.PI*2);
ctx.fillStyle="black";
ctx.fill();

/* 🌌 REAL SPACE BENDING PARTICLES */
parts.forEach(p=>{
  let dist = p.r;

  /* gravity pull */
  let gravity = 0.0008 * (400 / dist);

  /* faster near center */
  p.a += p.s + gravity;

  /* inward spiral */
  p.r *= 0.9985;
  if(p.r < 180) p.r = 600;

  /* lensing */
  let lens = 1 - Math.exp(-dist / 180);

  let x = cx + Math.cos(p.a) * p.r * (1 + 0.25 * (1 - lens));
  let y = cy + Math.sin(p.a) * p.r * 0.25 * lens;

  let glow = 1 + (1 - lens) * 2;

  ctx.beginPath();
  ctx.arc(x, y, p.size * glow, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255," + (0.6 + (1 - lens)) + ")";
  ctx.fill();
});

requestAnimationFrame(draw);
})();
</script>

</body>
</html>
