<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  background: black;
  color: white;
}

/* 🔐 LOCK SCREEN */
#lockScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
}

input { padding: 10px; font-size: 1.2rem; text-align: center; }
button { margin-top: 10px; padding: 10px 20px; }

/* 🌌 STARS */
#stars {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* 🎬 MAIN */
#mainContent {
  display: none;
  position: relative;
  width: 100%;
  height: 100vh;
}

/* 🎞️ FILM */
.film-container {
  position: absolute;
  width: 100%;
  height: 200%;
  z-index: 2;
}

.film-row {
  position: absolute;
  display: flex;
  gap: 20px;
  padding: 25px 0;
  width: 200vw;
  animation: scrollY linear infinite;
}

@keyframes scrollY {
  from { transform: translateY(0); }
  to { transform: translateY(-50%); }
}

.row1 { top: 0%; }
.row2 { top: 35%; }
.row3 { top: 70%; }

.slow { animation-duration: 45s; opacity: 0.5; }
.medium { animation-duration: 30s; opacity: 0.75; }
.fast { animation-duration: 20s; opacity: 1; }

/* 🎞️ HOLES */
.film-row::before,
.film-row::after {
  content: "";
  position: absolute;
  left: 0;
  width: 100%;
  height: 18px;
  background-image: repeating-linear-gradient(
    to right,
    transparent 0px,
    transparent 14px,
    black 14px,
    black 18px
  );
}
.film-row::before { top: 0; }
.film-row::after { bottom: 0; }

/* 📸 PHOTOS */
.photo {
  width: 180px;
  height: 120px;
  background-size: cover;
  background-position: center;
  border: 2px solid #333;
  filter: brightness(1.15) contrast(1.15);
}

/* 💌 LETTERS */
.letter {
  position: absolute;
  width: 220px;
  padding: 15px;
  background: rgba(0,0,0,0.6);
  border: 1px solid white;
  z-index: 3;
}

#l1 { top: 10%; left: 5%; }
#l2 { top: 30%; right: 5%; }
#l3 { top: 55%; left: 10%; }
#l4 { top: 70%; right: 10%; }
#l5 { top: 20%; left: 40%; }
#l6 { top: 65%; left: 45%; }

/* ♾️ BUTTON */
#portalBtn {
  position: fixed;
  bottom: 20px;
  right: 25px;
  opacity: 0.4;
  cursor: pointer;
  z-index: 5;
}

/* 🌌 BLACK HOLE */
#blackHolePage {
  position: fixed;
  inset: 0;
  display: none;
  background: black;
  z-index: 200;
}

#backBtn {
  position: absolute;
  bottom: 20px;
  right: 25px;
  cursor: pointer;
}

/* 💬 PHRASES */
.phrase {
  position: absolute;
  color: white;
  font-size: 14px;
  animation: popOut 0.6s ease-out, fadeOut 2.5s forwards;
}

@keyframes popOut {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.2) translateY(-20px); opacity: 1; }
  100% { transform: translateY(-10px); }
}

@keyframes fadeOut {
  100% { opacity: 0; transform: translateY(80px); }
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div id="lockScreen">
  <h1>Enter Passcode</h1>
  <input type="password" id="code">
  <button onclick="unlock()">Unlock</button>
</div>

<div id="mainContent">

<div class="film-container">
  <!-- same film rows -->
  <div class="film-row row1 slow">
    <div class="photo" style="background-image:url('1.jpg')"></div>
    <div class="photo" style="background-image:url('2.jpg')"></div>
    <div class="photo" style="background-image:url('3.jpg')"></div>
    <div class="photo" style="background-image:url('4.jpg')"></div>
    <div class="photo" style="background-image:url('5.jpg')"></div>
    <div class="photo" style="background-image:url('1.jpg')"></div>
    <div class="photo" style="background-image:url('2.jpg')"></div>
    <div class="photo" style="background-image:url('3.jpg')"></div>
    <div class="photo" style="background-image:url('4.jpg')"></div>
    <div class="photo" style="background-image:url('5.jpg')"></div>
  </div>

  <div class="film-row row2 medium">
    <div class="photo" style="background-image:url('6.jpg')"></div>
    <div class="photo" style="background-image:url('7.jpg')"></div>
    <div class="photo" style="background-image:url('8.jpg')"></div>
    <div class="photo" style="background-image:url('9.jpg')"></div>
    <div class="photo" style="background-image:url('6.jpg')"></div>
    <div class="photo" style="background-image:url('7.jpg')"></div>
    <div class="photo" style="background-image:url('8.jpg')"></div>
    <div class="photo" style="background-image:url('9.jpg')"></div>
  </div>

  <div class="film-row row3 fast">
    <div class="photo" style="background-image:url('10.jpg')"></div>
    <div class="photo" style="background-image:url('11.jpg')"></div>
    <div class="photo" style="background-image:url('12.jpg')"></div>
    <div class="photo" style="background-image:url('10.jpg')"></div>
    <div class="photo" style="background-image:url('11.jpg')"></div>
    <div class="photo" style="background-image:url('12.jpg')"></div>
  </div>
</div>

<div class="letter" id="l1">Message 💌</div>
<div class="letter" id="l2">Memory ✨</div>
<div class="letter" id="l3">Note 💭</div>
<div class="letter" id="l4">Meaning ❤️</div>
<div class="letter" id="l5">Inside joke 😌</div>
<div class="letter" id="l6">Forever ♾️</div>

<div id="portalBtn" onclick="openPortal()">∞</div>
</div>

<div id="blackHolePage">
<canvas id="bhCanvas"></canvas>
<div id="backBtn" onclick="closePortal()">∞</div>
</div>

<audio id="bgMusic" loop>
<source src="your-song.mp3">
</audio>

<script>
/* unlock */
function unlock(){
if(code.value==="yourpasscode"){
lockScreen.style.display="none";
mainContent.style.display="block";
bgMusic.volume=0;
bgMusic.play();
let v=0;
let fade=setInterval(()=>{if(v<0.6){v+=0.05;bgMusic.volume=v;}else clearInterval(fade);},200);
}}

/* portal */
function openPortal(){mainContent.style.display="none";blackHolePage.style.display="block";}
function closePortal(){blackHolePage.style.display="none";mainContent.style.display="block";}

/* 🌌 BLACK HOLE CINEMATIC */
const c=document.getElementById("bhCanvas");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let parts=[];
for(let i=0;i<1600;i++){
parts.push({
a:Math.random()*Math.PI*2,
r:200+Math.random()*700,
s:0.002+Math.random()*0.002,
size:Math.random()*1.5
});
}

const phrases=["I remember you","always here","you matter","forever us","still with you","never gone"];
c.onclick=e=>{
let d=document.createElement("div");
d.className="phrase";
d.innerText=phrases[Math.floor(Math.random()*6)];
d.style.left=e.clientX+"px;
d.style.top=e.clientY+"px;
document.body.appendChild(d);
setTimeout(()=>d.remove(),2500);
};

(function draw(){
ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,c.width,c.height);

let cx=c.width/2,cy=c.height/2;

/* glow */
let g=ctx.createRadialGradient(cx,cy,100,cx,cy,450);
g.addColorStop(0,"rgba(200,200,255,0.25)");
g.addColorStop(1,"transparent");
ctx.fillStyle=g;
ctx.beginPath();
ctx.arc(cx,cy,450,0,6.28);
ctx.fill();

/* core */
ctx.beginPath();
ctx.arc(cx,cy,170,0,6.28);
ctx.fillStyle="black";
ctx.fill();

/* cinematic bending */
parts.forEach(p=>{
let dist=p.r;
let gravity=0.001*(400/dist);

p.a+=p.s+gravity;
p.r*=0.998;
if(p.r<180)p.r=700;

let lens=1-Math.exp(-dist/200);

let x=cx+Math.cos(p.a)*p.r*(1+0.35*(1-lens));
let y=cy+Math.sin(p.a)*p.r*0.25*lens;

let brightness=0.5+(1-lens);

ctx.beginPath();
ctx.arc(x,y,p.size*(1+(1-lens)),0,6.28);
ctx.fillStyle="rgba(255,255,255,"+brightness+")";
ctx.fill();
});

requestAnimationFrame(draw);
})();
</script>

</body>
</html>
