<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Space Memories | Final Edition</title>

<style>
:root {
  --gold: #e2b04a;
}

body {
  margin: 0; padding: 0; overflow: hidden;
  font-family: 'Courier New', monospace;
  background: #000; color: white;
}

/* ✨ PERSISTENT STARFIELD (Shows on Page 2 and Black Hole) */
.stars-container {
  position: fixed;
  inset: 0;
  z-index: 0; /* Behind everything */
  pointer-events: none;
}

.stars {
  position: absolute;
  width: 200%; height: 200%;
  background-image: 
    radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 100px 150px, #fff, rgba(0,0,0,0)),
    radial-gradient(2px 2px at 250px 350px, #fff, rgba(0,0,0,0));
  background-size: 300px 300px;
  animation: starTravel 120s linear infinite;
}
.stars-fast { opacity: 0.5; animation-duration: 80s; }
.stars-slow { opacity: 0.2; animation-duration: 200s; transform: scale(1.5); }

@keyframes starTravel {
  from { transform: translate(0, 0); }
  to { transform: translate(-15%, -10%); }
}

/* 🔐 LOCK SCREEN */
#lockScreen {
  position: fixed; inset: 0; background: black;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  z-index: 1000;
}
#lockScreen input {
  background: transparent; border: none; border-bottom: 2px solid var(--gold);
  color: white; padding: 10px; font-size: 1.5rem; text-align: center; outline: none; margin-bottom: 20px;
}

/* 🎬 MAIN CONTENT (The Space Gallery) */
#mainContent {
  display: none; position: relative; width: 100%; height: 100vh; z-index: 1;
}

/* 🎞️ CINEMA FILM STRIPS */
.film-container {
  position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-around;
  z-index: 2;
}
.film-row {
  display: flex; gap: 25px; padding: 35px 0; width: max-content;
  background: rgba(0, 0, 0, 0.5); /* Semi-transparent to see stars behind */
  border-top: 4px dashed rgba(255,255,255,0.1);
  border-bottom: 4px dashed rgba(255,255,255,0.1);
  animation: scrollFilm linear infinite;
}
@keyframes scrollFilm { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.row1 { animation-duration: 70s; }
.row2 { animation-duration: 50s; }
.row3 { animation-duration: 90s; }

.photo {
  flex-shrink: 0; width: 260px; height: 160px;
  background-size: cover; background-position: center;
  border: 1px solid #333; transition: 0.4s;
}
.photo:hover { transform: scale(1.1); border-color: var(--gold); z-index: 50; }

/* 💌 THE 6 LETTERS */
.letter {
  position: absolute; width: 200px; padding: 15px;
  background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px;
  font-size: 0.85rem; animation: floatLetter 6s ease-in-out infinite; z-index: 100;
}
@keyframes floatLetter {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-15px) rotate(1.5deg); }
}
/* Placement */
#l1 { top: 8%; left: 5%; } #l2 { top: 12%; right: 7%; } #l3 { top: 42%; left: 10%; }
#l4 { bottom: 42%; right: 12%; } #l5 { bottom: 12%; left: 8%; } #l6 { bottom: 8%; right: 5%; }

/* ♾️ PORTAL BUTTON */
#portalBtn {
  position: fixed; bottom: 25px; right: 25px; font-size: 2.5rem;
  color: var(--gold); cursor: pointer; opacity: 0.6; z-index: 200;
  transition: 0.3s;
}
#portalBtn:hover { transform: scale(1.2); opacity: 1; }

/* 🌌 BLACK HOLE PAGE */
#blackHolePage {
  position: fixed; inset: 0; display: none; background: black; z-index: 500;
}
#backBtn {
  position: absolute; bottom: 25px; right: 25px; cursor: pointer; z-index: 600; color: white; opacity: 0.4;
}

/* 💬 PHRASES */
.phrase {
  position: absolute; color: white; font-size: 1.1rem; pointer-events: none; z-index: 1000;
  animation: phraseAnim 3s forwards; letter-spacing: 2px; text-shadow: 0 0 10px white;
}
@keyframes phraseAnim {
  0% { transform: scale(0.5); opacity: 0; filter: blur(5px); }
  20% { opacity: 1; filter: blur(0); }
  100% { transform: scale(1.3) translateY(-60px); opacity: 0; }
}
</style>
</head>
<body>

<div class="stars-container">
    <div class="stars stars-slow"></div>
    <div class="stars stars-fast"></div>
</div>

<div id="lockScreen">
  <input type="password" id="code" placeholder="ENTER CODE">
  <button onclick="unlock()" style="cursor:pointer; padding: 10px 20px;">Unlock</button>
</div>

<div id="mainContent">
  <div class="letter" id="l1">Every day with you is a masterpiece. 💌</div>
  <div class="letter" id="l2">I love how the world feels when we're together. ✨</div>
  <div class="letter" id="l3">Remember this? I still smile thinking about it. 😂</div>
  <div class="letter" id="l4">You are the gravity that keeps me grounded. ❤️</div>
  <div class="letter" id="l5">Across every galaxy, I'd still find you. ♾️</div>
  <div class="letter" id="l6">Thank you for being my constant in this chaos. 🏠</div>

  <div class="film-container">
    <div class="film-row row1">
      <div class="photo" style="background-image:url('1.jpg')"></div>
      <div class="photo" style="background-image:url('2.jpg')"></div>
      <div class="photo" style="background-image:url('3.jpg')"></div>
      <div class="photo" style="background-image:url('1.jpg')"></div>
      <div class="photo" style="background-image:url('2.jpg')"></div>
      <div class="photo" style="background-image:url('3.jpg')"></div>
    </div>
    <div class="film-row row2">
      <div class="photo" style="background-image:url('4.jpg')"></div>
      <div class="photo" style="background-image:url('5.jpg')"></div>
      <div class="photo" style="background-image:url('6.jpg')"></div>
      <div class="photo" style="background-image:url('4.jpg')"></div>
      <div class="photo" style="background-image:url('5.jpg')"></div>
      <div class="photo" style="background-image:url('6.jpg')"></div>
    </div>
    <div class="film-row row3">
      <div class="photo" style="background-image:url('7.jpg')"></div>
      <div class="photo" style="background-image:url('8.jpg')"></div>
      <div class="photo" style="background-image:url('9.jpg')"></div>
      <div class="photo" style="background-image:url('7.jpg')"></div>
      <div class="photo" style="background-image:url('8.jpg')"></div>
      <div class="photo" style="background-image:url('9.jpg')"></div>
    </div>
  </div>
  
  <div id="portalBtn" onclick="openPortal()">∞</div>
</div>

<div id="blackHolePage">
  <canvas id="glcanvas"></canvas>
  <div id="backBtn" onclick="closePortal()">RETURN TO REALITY</div>
</div>

<script>
function unlock() {
  if(document.getElementById("code").value.trim() === "yourpasscode") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  } else { alert("Wrong code"); }
}

function openPortal(){
  document.getElementById("mainContent").style.display = "none";
  document.getElementById("blackHolePage").style.display = "block";
}
function closePortal(){
  document.getElementById("blackHolePage").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
}

const phrases = ["Time is relative", "I found you", "Always", "Inside the singularity", "Endless Love"];
document.getElementById("blackHolePage").addEventListener("click", (e) => {
    if(e.target.id === "backBtn") return;
    let el = document.createElement("div");
    el.className = "phrase";
    el.innerText = phrases[Math.floor(Math.random() * phrases.length)];
    el.style.left = e.clientX + "px";
    el.style.top = e.clientY + "px";
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
});

/* 🌌 CINEMATIC GARGANTUA SHADER */
const canvas = document.getElementById('glcanvas');
const gl = canvas.getContext('webgl');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; gl.viewport(0,0,canvas.width,canvas.height); }
window.addEventListener('resize', resize); resize();

const vs = `attribute vec4 aVertexPosition; void main() { gl_Position = aVertexPosition; }`;
const fs = `
    precision highp float;
    uniform vec2 u_resolution;
    uniform float u_time;

    float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
    float noise(vec2 p) {
        vec2 i = floor(p); vec2 f = fract(p);
        f = f*f*(3.0-2.0*f);
        return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
    }
    float fbm(vec2 p) {
        float v = 0.0, a = 0.5;
        for (int i = 0; i < 5; i++) { v += a * noise(p); p *= 2.0; a *= 0.5; }
        return v;
    }

    void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.x, u_resolution.y);
        float r = length(uv);
        float a = atan(uv.y, uv.x);

        float lens = 0.12 / (r + 0.01);
        float rLensed = r - lens;

        float disk = smoothstep(0.22, 0.25, rLensed) * smoothstep(0.8, 0.3, rLensed);
        float flow = fbm(vec2(a * 2.0 + u_time * 0.4, rLensed * 8.0 - u_time * 0.2));
        float beaming = pow(max(0.0, 1.0 + uv.x * 1.5), 1.3);
        
        vec3 fire = vec3(1.0, 0.4, 0.1) * flow * disk * beaming * 2.5;
        vec3 core = vec3(1.0, 0.9, 0.8) * pow(disk * flow, 4.0) * 2.0;
        
        vec3 finalCol = (fire + core) * smoothstep(0.18, 0.2, rLensed);
        gl_FragColor = vec4(finalCol, 1.0);
    }
`;

const prog = gl.createProgram();
function s(t,src){const sh=gl.createShader(t);gl.shaderSource(sh,src);gl.compileShader(sh);return sh;}
gl.attachShader(prog, s(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, s(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog); gl.useProgram(prog);
gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,1,-1,-1,1,1,1,-1]), gl.STATIC_DRAW);
const p = gl.getAttribLocation(prog, "aVertexPosition");
gl.enableVertexAttribArray(p); gl.vertexAttribPointer(p, 2, gl.FLOAT, false, 0, 0);

function draw() {
    if(document.getElementById("blackHolePage").style.display === "block") {
        gl.uniform2f(gl.getUniformLocation(prog, "u_resolution"), canvas.width, canvas.height);
        gl.uniform1f(gl.getUniformLocation(prog, "u_time"), performance.now()*0.001);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
