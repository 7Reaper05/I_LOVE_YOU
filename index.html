<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Space Memories</title>

<style>
:root {
  --gold: #e2b04a;
}

body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  background: #000;
  color: white;
}

/* ✨ PARALLAX STARS BACKGROUND */
.stars-container {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.stars {
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: 
    radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
    radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 50px 160px, #ddd, rgba(0,0,0,0));
  background-size: 250px 250px;
  animation: parallaxMove 120s linear infinite;
}

.stars-back { opacity: 0.3; animation-duration: 180s; }
.stars-front { opacity: 0.6; animation-duration: 90s; scale: 1.2; }

@keyframes parallaxMove {
  from { transform: translate(0, 0); }
  to { transform: translate(-10%, -10%); }
}

/* 🔐 LOCK SCREEN */
#lockScreen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

#lockScreen input {
  background: transparent;
  border: none;
  border-bottom: 2px solid var(--gold);
  color: white;
  padding: 10px;
  font-size: 1.5rem;
  text-align: center;
  outline: none;
  margin-bottom: 20px;
}

/* 🎬 MAIN CONTENT (The Second Page) */
#mainContent {
  display: none;
  position: relative;
  width: 100%;
  height: 100vh;
  z-index: 1;
}

/* 🎞️ CINEMA FILM STRIPS */
.film-container {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  pointer-events: none; /* Let clicks pass to letters if needed */
}

.film-row {
  display: flex;
  gap: 25px;
  padding: 35px 0;
  width: max-content;
  background: rgba(20, 20, 20, 0.7);
  border-top: 4px dashed rgba(255,255,255,0.2);
  border-bottom: 4px dashed rgba(255,255,255,0.2);
  animation: scrollFilm linear infinite;
  pointer-events: auto;
}

@keyframes scrollFilm {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.row1 { animation-duration: 60s; }
.row2 { animation-duration: 45s; }
.row3 { animation-duration: 75s; }

.photo {
  flex-shrink: 0;
  width: 260px;
  height: 160px;
  background-size: cover;
  background-position: center;
  border: 2px solid #333;
  transition: 0.4s;
}

.photo:hover {
  transform: scale(1.1);
  border-color: var(--gold);
  z-index: 50;
}

/* 💌 THE 6 LETTERS */
.letter {
  position: absolute;
  width: 200px;
  padding: 15px;
  background: rgba(255, 255, 255, 0.07);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 4px;
  font-size: 0.9rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  animation: floatLetter 6s ease-in-out infinite;
  z-index: 100;
  cursor: default;
}

@keyframes floatLetter {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-20px) rotate(2deg); }
}

/* Precise Placement of the 6 Letters */
#l1 { top: 10%; left: 5%; animation-delay: 0s; }
#l2 { top: 15%; right: 10%; animation-delay: 1s; }
#l3 { top: 45%; left: 8%; animation-delay: 2s; }
#l4 { top: 50%; right: 15%; animation-delay: 0.5s; }
#l5 { bottom: 10%; left: 12%; animation-delay: 1.5s; }
#l6 { bottom: 15%; right: 5%; animation-delay: 2.5s; }

/* ♾️ PORTAL BUTTON */
#portalBtn {
  position: fixed;
  bottom: 25px;
  right: 25px;
  font-size: 2.5rem;
  color: var(--gold);
  cursor: pointer;
  opacity: 0.5;
  transition: 0.3s;
  z-index: 200;
}
#portalBtn:hover { opacity: 1; transform: scale(1.1); }

/* 🌌 BLACK HOLE PAGE */
#blackHolePage {
  position: fixed;
  inset: 0;
  display: none;
  background: black;
  z-index: 500;
}
#backBtn {
  position: absolute;
  bottom: 25px;
  right: 25px;
  cursor: pointer;
  z-index: 600;
}
</style>
</head>
<body>

<div class="stars-container">
  <div class="stars stars-back"></div>
  <div class="stars stars-front"></div>
</div>

<div id="lockScreen">
  <input type="password" id="code" placeholder="ENTER CODE">
  <button onclick="unlock()" style="cursor:pointer; padding: 10px 20px;">Unlock</button>
</div>

<div id="mainContent">

  <div class="letter" id="l1">Our first date... I'll never forget how you looked. 💌</div>
  <div class="letter" id="l2">That night we stayed up until 4 AM just talking. ✨</div>
  <div class="letter" id="l3">The way you laugh is my favorite sound. 😂</div>
  <div class="letter" id="l4">I kept this note because it reminds me of us. ❤️</div>
  <div class="letter" id="l5">To the moon and back, forever. ♾️</div>
  <div class="letter" id="l6">Thank you for being my person. 🏠</div>

  <div class="film-container">
    <div class="film-row row1">
      <div class="photo" style="background-image:url('1.jpg')"></div>
      <div class="photo" style="background-image:url('2.jpg')"></div>
      <div class="photo" style="background-image:url('3.jpg')"></div>
      <div class="photo" style="background-image:url('1.jpg')"></div>
      <div class="photo" style="background-image:url('2.jpg')"></div>
      <div class="photo" style="background-image:url('3.jpg')"></div>
    </div>
    
    <div class="film-row row2">
      <div class="photo" style="background-image:url('4.jpg')"></div>
      <div class="photo" style="background-image:url('5.jpg')"></div>
      <div class="photo" style="background-image:url('6.jpg')"></div>
      <div class="photo" style="background-image:url('4.jpg')"></div>
      <div class="photo" style="background-image:url('5.jpg')"></div>
      <div class="photo" style="background-image:url('6.jpg')"></div>
    </div>
    
    <div class="film-row row3">
      <div class="photo" style="background-image:url('7.jpg')"></div>
      <div class="photo" style="background-image:url('8.jpg')"></div>
      <div class="photo" style="background-image:url('9.jpg')"></div>
      <div class="photo" style="background-image:url('7.jpg')"></div>
      <div class="photo" style="background-image:url('8.jpg')"></div>
      <div class="photo" style="background-image:url('9.jpg')"></div>
    </div>
  </div>

  <div id="portalBtn" onclick="openPortal()">∞</div>
</div>

<div id="blackHolePage">
  <canvas id="glcanvas"></canvas>
  <div id="backBtn" onclick="closePortal()">BACK</div>
</div>

<script>
function unlock() {
  const pass = document.getElementById("code").value.trim();
  if(pass === "yourpasscode") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  } else {
    alert("Wrong code");
  }
}

function openPortal(){
  document.getElementById("mainContent").style.display = "none";
  document.getElementById("blackHolePage").style.display = "block";
}
function closePortal(){
  document.getElementById("blackHolePage").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
}

/* BLACK HOLE SHADER (Basic version to keep it smooth) */
const canvas = document.getElementById('glcanvas');
const gl = canvas.getContext('webgl');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; gl.viewport(0,0,canvas.width,canvas.height); }
window.addEventListener('resize', resize); resize();

const vs = `attribute vec4 aVertexPosition; void main() { gl_Position = aVertexPosition; }`;
const fs = `
    precision highp float;
    uniform vec2 u_resolution;
    uniform float u_time;
    void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.x, u_resolution.y);
        float r = length(uv);
        float disk = smoothstep(0.2, 0.25, r) * smoothstep(0.6, 0.3, r);
        vec3 col = vec3(1.0, 0.4, 0.1) * disk * 2.0;
        col *= smoothstep(0.19, 0.2, r);
        gl_FragColor = vec4(col, 1.0);
    }
`;
const prog = gl.createProgram();
function s(t,src){const sh=gl.createShader(t);gl.shaderSource(sh,src);gl.compileShader(sh);return sh;}
gl.attachShader(prog, s(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, s(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog); gl.useProgram(prog);
gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,1,-1,-1,1,1,1,-1]), gl.STATIC_DRAW);
const p = gl.getAttribLocation(prog, "aVertexPosition");
gl.enableVertexAttribArray(p); gl.vertexAttribPointer(p, 2, gl.FLOAT, false, 0, 0);

function draw() {
    if(document.getElementById("blackHolePage").style.display === "block") {
        gl.uniform2f(gl.getUniformLocation(prog, "u_resolution"), canvas.width, canvas.height);
        gl.uniform1f(gl.getUniformLocation(prog, "u_time"), performance.now()*0.001);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
