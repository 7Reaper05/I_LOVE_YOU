<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memorias Estelares</title>

<style>
:root {
  --gold: #e2b04a;
  --bg: #000;
}

body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  background: var(--bg);
  color: white;
}

/* ✨ FONDO PARALLAX DE ESTRELLAS */
.stars-container {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%);
}

.stars {
  position: absolute;
  width: 200%;
  height: 200%;
  background-image: 
    radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
    radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
    radial-gradient(1.5px 1.5px at 50px 160px, #ddd, rgba(0,0,0,0));
  background-size: 200px 200px;
  animation: parallaxStars 100s linear infinite;
}

.stars-far { opacity: 0.3; animation-duration: 150s; scale: 0.8; }
.stars-near { opacity: 0.6; animation-duration: 80s; scale: 1.2; }

@keyframes parallaxStars {
  from { transform: translate(0, 0); }
  to { transform: translate(-20%, -20%); }
}

/* 🔐 LOCK SCREEN */
#lockScreen {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  transition: opacity 1s ease;
}

input {
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.3);
  color: white;
  padding: 10px;
  font-size: 1.5rem;
  text-align: center;
  outline: none;
}

button {
  margin-top: 30px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  padding: 10px 30px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 2px;
}

/* 🎬 MAIN CONTENT */
#mainContent {
  display: none;
  position: relative;
  width: 100%;
  height: 100vh;
  z-index: 1;
}

/* 🎞️ TIRAS DE CINTA (FILM STRIPS) */
.film-container {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
}

.film-row {
  display: flex;
  gap: 20px;
  padding: 30px 0;
  width: max-content;
  animation: scrollX linear infinite;
  border-top: 2px solid rgba(255,255,255,0.1);
  border-bottom: 2px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.3);
}

@keyframes scrollX {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

.row1 { animation-duration: 70s; }
.row2 { animation-duration: 50s; }
.row3 { animation-duration: 90s; }

.photo {
  flex-shrink: 0;
  width: 250px;
  height: 160px;
  background-size: cover;
  background-position: center;
  border: 5px solid #111;
  filter: grayscale(0.5);
  transition: 0.4s;
}

.photo:hover {
  filter: grayscale(0);
  transform: scale(1.05);
  border-color: var(--gold);
}

/* 💌 LAS 6 CARTAS DE ESPACIO */
.letter {
  position: absolute;
  width: 180px;
  padding: 15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(5px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 5px;
  font-size: 0.85rem;
  line-height: 1.4;
  animation: floatingCard 6s ease-in-out infinite;
  z-index: 10;
  pointer-events: none;
}

@keyframes floatingCard {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-15px) rotate(1deg); }
}

/* Posicionamiento de las 6 cartas */
#l1 { top: 10%; left: 5%; animation-delay: 0s; }
#l2 { top: 25%; right: 8%; animation-delay: 1s; }
#l3 { top: 45%; left: 12%; animation-delay: 2s; }
#l4 { bottom: 25%; right: 10%; animation-delay: 1.5s; }
#l5 { bottom: 10%; left: 7%; animation-delay: 0.5s; }
#l6 { top: 50%; right: 40%; animation-delay: 2.5s; }

/* ♾️ PORTAL BUTTON */
#portalBtn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  font-size: 2.5rem;
  color: var(--gold);
  cursor: pointer;
  z-index: 100;
  opacity: 0.6;
}

/* 🌌 BLACK HOLE PAGE */
#blackHolePage {
  position: fixed;
  inset: 0;
  display: none;
  background: black;
  z-index: 500;
}

#backBtn {
  position: absolute;
  bottom: 30px;
  right: 30px;
  color: white;
  cursor: pointer;
  z-index: 600;
}
</style>
</head>
<body>

<div class="stars-container">
    <div class="stars stars-far"></div>
    <div class="stars stars-near"></div>
</div>

<div id="lockScreen">
  <h1>Acceso Privado</h1>
  <input type="password" id="code" placeholder="CÓDIGO">
  <button onclick="unlock()">Entrar</button>
</div>

<div id="mainContent">
  <div class="film-container">
    <div class="film-row row1">
      <div class="photo" style="background-image:url('1.jpg')"></div>
      <div class="photo" style="background-image:url('2.jpg')"></div>
      <div class="photo" style="background-image:url('3.jpg')"></div>
      <div class="photo" style="background-image:url('1.jpg')"></div>
      <div class="photo" style="background-image:url('2.jpg')"></div>
      <div class="photo" style="background-image:url('3.jpg')"></div>
    </div>
    <div class="film-row row2">
      <div class="photo" style="background-image:url('4.jpg')"></div>
      <div class="photo" style="background-image:url('5.jpg')"></div>
      <div class="photo" style="background-image:url('6.jpg')"></div>
      <div class="photo" style="background-image:url('4.jpg')"></div>
      <div class="photo" style="background-image:url('5.jpg')"></div>
      <div class="photo" style="background-image:url('6.jpg')"></div>
    </div>
    <div class="film-row row3">
      <div class="photo" style="background-image:url('7.jpg')"></div>
      <div class="photo" style="background-image:url('8.jpg')"></div>
      <div class="photo" style="background-image:url('9.jpg')"></div>
      <div class="photo" style="background-image:url('7.jpg')"></div>
      <div class="photo" style="background-image:url('8.jpg')"></div>
      <div class="photo" style="background-image:url('9.jpg')"></div>
    </div>
  </div>

  <div class="letter" id="l1">Nuestro primer capítulo. 💌</div>
  <div class="letter" id="l2">Aquella noche bajo las estrellas. ✨</div>
  <div class="letter" id="l3">La risa que nunca termina. 😂</div>
  <div class="letter" id="l4">Promesas grabadas en el tiempo. ❤️</div>
  <div class="letter" id="l5">Un viaje sin final. ♾️</div>
  <div class="letter" id="l6">Siempre serás mi lugar favorito. 🏠</div>

  <div id="portalBtn" onclick="openPortal()">∞</div>
</div>

<div id="blackHolePage">
  <canvas id="glcanvas"></canvas>
  <div id="backBtn" onclick="closePortal()">VOLVER</div>
</div>

<script>
function unlock() {
  const pass = document.getElementById("code").value.trim();
  if(pass === "tu_codigo") {
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  } else {
    alert("Código incorrecto");
  }
}

function openPortal(){
  document.getElementById("mainContent").style.display = "none";
  document.getElementById("blackHolePage").style.display = "block";
}
function closePortal(){
  document.getElementById("blackHolePage").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
}

/* 🌌 BLACK HOLE SHADER */
const canvas = document.getElementById('glcanvas');
const gl = canvas.getContext('webgl');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; gl.viewport(0,0,canvas.width,canvas.height); }
window.addEventListener('resize', resize); resize();

const vs = `attribute vec4 aVertexPosition; void main() { gl_Position = aVertexPosition; }`;
const fs = `
    precision highp float;
    uniform vec2 u_resolution;
    uniform float u_time;
    float hash(vec2 p) { return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453); }
    float noise(vec2 p) {
        vec2 i = floor(p); vec2 f = fract(p);
        f = f*f*(3.0-2.0*f);
        return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
    }
    void main() {
        vec2 uv = (gl_FragCoord.xy - 0.5 * u_resolution.xy) / min(u_resolution.x, u_resolution.y);
        float r = length(uv);
        float a = atan(uv.y, uv.x);
        float disk = smoothstep(0.2, 0.25, r) * smoothstep(0.6, 0.3, r);
        float beaming = pow(max(0.0, 1.0 + uv.x * 1.5), 1.5);
        vec3 col = vec3(1.0, 0.5, 0.2) * disk * beaming * (noise(vec2(a*5.0+u_time, r*10.0))*2.0);
        col *= smoothstep(0.18, 0.2, r);
        gl_FragColor = vec4(col, 1.0);
    }
`;
const prog = gl.createProgram();
function s(t,src){const sh=gl.createShader(t);gl.shaderSource(sh,src);gl.compileShader(sh);return sh;}
gl.attachShader(prog, s(gl.VERTEX_SHADER, vs));
gl.attachShader(prog, s(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(prog); gl.useProgram(prog);
gl.bindBuffer(gl.ARRAY_BUFFER, gl.createBuffer());
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,1,-1,-1,1,1,1,-1]), gl.STATIC_DRAW);
const p = gl.getAttribLocation(prog, "aVertexPosition");
gl.enableVertexAttribArray(p); gl.vertexAttribPointer(p, 2, gl.FLOAT, false, 0, 0);

function draw() {
    if(document.getElementById("blackHolePage").style.display === "block") {
        gl.uniform2f(gl.getUniformLocation(prog, "u_resolution"), canvas.width, canvas.height);
        gl.uniform1f(gl.getUniformLocation(prog, "u_time"), performance.now()*0.001);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }
    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
